<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
</head>
<body>

<h2>Admin Panel</h2>

<button onclick="load()">Load Jobs</button>

<div id="jobs"></div>

<script>
function load(){
    fetch('/api/jobs')
    .then(r=>r.json())
    .then(data=>{
        document.getElementById('jobs').innerHTML =
        data.map(j=>`
            <div>
                <b>${j.id}</b><br>
                ${j.status}<br>
                ${j.url}<br>
                ${j.status === "completed" ? `<a href="/downloads/${j.id}.mp4">Download</a>` : ""}
                <hr>
            </div>
        `).join("")
    });
}
</script>

</body>
</html>
