<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto SaaS Downloader</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #0f172a; --card: rgba(30,41,59,0.8); --primary: #3b82f6; --success: #10b981; --warning: #f59e0b; --text: #f8fafc; --muted: #94a3b8; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, var(--bg), #1e293b); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 700px; background: var(--card); backdrop-filter: blur(12px); border-radius: 20px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { text-align: center; margin-bottom: 20px; font-size: 28px; }
        
        .auth-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; outline: none; font-size: 14px; }
        .badge { padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; align-self: center; }
        .badge-free { background: rgba(245,158,11,0.2); color: var(--warning); border: 1px solid var(--warning); }
        .badge-pro { background: rgba(16,185,129,0.2); color: var(--success); border: 1px solid var(--success); }

        .download-box { display: flex; gap: 10px; margin-bottom: 25px; }
        button { padding: 12px 20px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2563eb; }
        button:disabled { background: #475569; cursor: not-allowed; }

        .jobs { display: flex; flex-direction: column; gap: 15px; }
        .job { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; animation: slide 0.3s; }
        @keyframes slide { from { opacity: 0; transform: translateY(-10px); } }
        .pbar { width: 100%; background: rgba(255,255,255,0.1); border-radius: 8px; height: 8px; margin: 10px 0; }
        .pfill { height: 100%; background: var(--primary); border-radius: 8px; transition: width 0.3s; }
        .save-btn { padding: 8px 16px; background: transparent; border: 1px solid var(--success); color: var(--success); border-radius: 8px; text-decoration: none; font-size: 12px; font-weight: bold; display: inline-block; margin-top: 5px; }
        .save-btn:hover { background: var(--success); color: white; }

        /* Payment Modal */
        .modal-bg { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 100; }
        .modal { background: var(--card); padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; text-align: center; background: rgba(0,0,0,0.3); border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
        .tab.active { border-color: var(--primary); background: rgba(59,130,246,0.2); }
        .pay-content { display: none; } .pay-content.active { display: block; }
        .wallet-addr { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; word-break: break-all; margin: 10px 0; color: var(--warning); font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <h1>⬇️ Crypto SaaS Pro</h1>
    
    <div class="auth-box">
        <input type="text" id="apiKey" placeholder="Enter your API Key..." value="FREE-KEY-12345">
        <div id="badge" class="badge badge-free">Free</div>
    </div>

    <div class="download-box">
        <input type="text" id="url" placeholder="Paste video URL here...">
        <button onclick="startDownload()">Download</button>
    </div>

    <div class="jobs" id="jobList"></div>

    <div style="text-align:center; margin-top: 20px;">
        <button style="background: var(--success);" onclick="openModal()">Upgrade to Pro ($9.99)</button>
    </div>
</div>

<!-- Payment Modal -->
<div class="modal-bg" id="modal">
    <div class="modal">
        <h2 style="margin-bottom:20px;">Choose Payment Method</h2>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('auto')">Auto (BTC/ETH)</div>
            <div class="tab" onclick="switchTab('manual')">Manual (PI/TON)</div>
        </div>

        <div id="autoTab" class="pay-content active">
            <p style="color:var(--muted); margin-bottom:15px;">Pay securely via Coinbase Commerce. Instant approval.</p>
            <button style="width:100%; background:#3b82f6;" onclick="payCoinbase()">Pay with Coinbase</button>
        </div>

        <div id="manualTab" class="pay-content">
            <p style="color:var(--muted);">Send exactly 9.99$ worth of PI/TON to this wallet:</p>
            <div class="wallet-addr" id="walletDisplay">Loading wallet...</div>
            <input type="text" id="txidInput" placeholder="Enter your Transaction ID (TXID)">
            <button style="width:100%; background:var(--warning); color:black; margin-top:10px;" onclick="payManual()">Submit Proof & Wait</button>
        </div>

        <button style="background:#ef4444; width:100%; margin-top:20px;" onclick="closeModal()">Cancel</button>
    </div>
</div>

<script>
    const socket = io();
    const jobs = {};
    const getKey = () => document.getElementById('apiKey').value.trim();

    function startDownload() {
        const u = document.getElementById('url').value.trim();
        if(!u) return;
        fetch(`/api/download?url=${encodeURIComponent(u)}&api_key=${getKey()}`)
            .then(r => r.json())
            .then(d => {
                if(d.success) { document.getElementById('url').value = ""; addJob(d.jobId, u); }
                else alert(d.message);
            });
    }

    function addJob(id, url) {
        const div = document.createElement('div'); div.className = 'job'; div.id = id;
        div.innerHTML = `<div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--muted)">${url.substring(0,40)}...</span><span id="s-${id}" style="color:var(--warning)">Queued</span></div><div class="pbar"><div id="p-${id}" class="pfill" style="width:0%"></div></div><div id="a-${id}"></div>`;
        document.getElementById('jobList').prepend(div); jobs[id] = div;
    }

    socket.on('job-started', (j) => { document.getElementById(`s-${j.id}`).style.color = 'var(--primary)'; document.getElementById(`s-${j.id}`).innerText = 'Downloading...'; });
    socket.on('job-progress', (d) => { document.getElementById(`p-${d.jobId}`).style.width = d.progress.toFixed(1)+'%'; document.getElementById(`s-${d.jobId}`).innerText = d.progress.toFixed(1)+'%'; });
    socket.on('job-finished', (j) => {
        const s = document.getElementById(`s-${j.id}`); const p = document.getElementById(`p-${j.id}`); const a = document.getElementById(`a-${j.id}`);
        if(j.status==='completed') { s.style.color='var(--success)'; s.innerText='Completed'; p.style.width='100%'; p.style.background='var(--success)'; a.innerHTML=`<a href="/api/get-file/${j.id}?api_key=${getKey()}" class="save-btn" download>💾 Save to Device</a>`; }
        else { s.style.color='#ef4444'; s.innerText='Failed'; p.style.background='#ef4444'; }
    });

    // Modal Logic
    const openModal = () => document.getElementById('modal').style.display = 'flex';
    const closeModal = () => document.getElementById('modal').style.display = 'none';
    const switchTab = (tab) => {
        document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='auto'?0:1)===i));
        document.getElementById('autoTab').classList.toggle('active', tab==='auto');
        document.getElementById('manualTab').classList.toggle('active', tab==='manual');
        if(tab==='manual') document.getElementById('walletDisplay').innerText = "GDrA2... (Replace in server.js)"; // Will be fetched from server in real prod
    }

    async function payCoinbase() {
        const res = await fetch('/api/create-payment-unified', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({api_key: getKey(), method:'coinbase'}) });
        const data = await res.json();
        if(data.success) window.open(data.payment_url, '_blank');
        else alert(data.message);
    }

    async function payManual() {
        const txid = document.getElementById('txidInput').value.trim();
        if(!txid) return alert("Please enter TXID");
        const res = await fetch('/api/create-payment-unified', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({api_key: getKey(), method:'pi', txid: txid}) });
        const data = await res.json();
        if(data.success) { alert("Submitted! Wait for admin approval."); closeModal(); }
        else alert(data.message);
    }
</script>
</body>
</html>
