<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}

button{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.approve{ background:#10b981; color:white; }
.reject{ background:#ef4444; color:white; }
</style>
</head>

<body>

<h2>Admin Payments</h2>

<input id="secret" placeholder="Admin Secret">

<button onclick="load()">Load</button>

<div id="list"></div>

<script>
async function load(){

const secret = document.getElementById("secret").value;

const res = await fetch("/api/admin/payments?secret="+secret);
const data = await res.json();

const list = document.getElementById("list");
list.innerHTML = "";

if(!data.success){
    list.innerHTML = "Unauthorized";
    return;
}

data.payments.forEach(p => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <p>ID: ${p.id}</p>
        <p>User: ${p.apiKey}</p>
        <p>Status: ${p.status}</p>

        <button class="approve" onclick="approve('${p.id}')">Approve</button>
        <button class="reject" onclick="reject('${p.id}')">Reject</button>
    `;

    list.appendChild(div);
});

}

async function approve(id){

const secret = document.getElementById("secret").value;

await fetch("/api/admin/approve",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({secret,paymentId:id})
});

load();
}

async function reject(id){

const secret = document.getElementById("secret").value;

await fetch("/api/admin/reject",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({secret,paymentId:id})
});

load();
}
</script>

</body>
</html>
